server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # SPA: cualquier ruta que no matchee un archivo real cae a index.html
    # (react-router-dom maneja el routing del lado del cliente).
    location / {
        try_files $uri $uri/ /index.html;
    }

    location ~* \.(?:css|js|svg|webp|png|jpg|jpeg|gif|ico|woff2?)$ {
        try_files $uri =404;
        expires 7d;
        add_header Cache-Control "public, immutable";
    }
}
